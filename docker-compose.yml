version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: payments_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: payments_rabbitmq
    restart: always
    ports:
      - "5672:5672"     # broker
      - "15672:15672"   # UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  api:
    build: .
    container_name: payments_api
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payments
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: super-secret
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    container_name: payments_worker
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payments
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    command: >
      python app/worker.py

volumes:
  postgres_data: